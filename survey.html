<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅游问卷调查 - 探索世界</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .survey-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #007bff;
            margin-bottom: 30px;
        }
        form {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
        }
        h3 {
            color: #007bff;
            margin-top: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #007bff;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="survey-container">
        <h1>旅游问卷调查</h1>
        <p style="text-align: center;">请填写以下问卷，帮助我们更好地了解您的旅游偏好。</p>
        <form action="#" method="post">
            <h3>基本信息</h3>
            <label for="name">姓名：</label>
            <input type="text" id="name" name="name" required>

            <label for="email">邮箱：</label>
            <input type="email" id="email" name="email" required>

            <label for="age">年龄：</label>
            <input type="number" id="age" name="age" min="1" max="120">

            <h3>旅游偏好</h3>
            <label for="destination">最想去的旅游目的地：</label>
            <select id="destination" name="destination">
                <option value="">请选择</option>
                <option value="beijing">北京</option>
                <option value="shanghai">上海</option>
                <option value="xian">西安</option>
                <option value="guilin">桂林</option>
                <option value="lijiang">丽江</option>
                <option value="zhangjiajie">张家界</option>
                <option value="hangzhou">杭州</option>
                <option value="sanya">三亚</option>
                <option value="chengdu">成都</option>
                <option value="kunming">昆明</option>
                <option value="nanjing">南京</option>
                <option value="suzhou">苏州</option>
                <option value="guangzhou">广州</option>
                <option value="shenzhen">深圳</option>
                <option value="tianjin">天津</option>
                <option value="pingyao">平遥</option>
                <option value="lanzhou">兰州</option>
                <option value="harbin">哈尔滨</option>
                <option value="dalian">大连</option>
            </select>

            <label for="travel_type">旅游类型：</label>
            <select id="travel_type" name="travel_type">
                <option value="">请选择</option>
                <option value="beach">海滩度假</option>
                <option value="city">城市观光</option>
                <option value="adventure">冒险旅行</option>
                <option value="cultural">文化体验</option>
                <option value="food">美食之旅</option>
                <option value="nature">自然风光</option>
                <option value="historical">历史古迹</option>
            </select>

            <label for="budget">预算范围（每人每天）：</label>
            <select id="budget" name="budget">
                <option value="">请选择</option>
                <option value="low">500元以下</option>
                <option value="medium">500-2000元</option>
                <option value="high">2000元以上</option>
            </select>

            <label for="group_size">出行人数：</label>
            <select id="group_size" name="group_size">
                <option value="">请选择</option>
                <option value="solo">独自旅行</option>
                <option value="couple">情侣/夫妻</option>
                <option value="family">家庭出游</option>
                <option value="group">团体旅行</option>
            </select>

            <label for="duration">旅行时长：</label>
            <select id="duration" name="duration">
                <option value="">请选择</option>
                <option value="1-3">1-3天</option>
                <option value="4-7">4-7天</option>
                <option value="8-14">8-14天</option>
                <option value="15+">15天以上</option>
            </select>

            <label for="comments">其他建议：</label>
            <textarea id="comments" name="comments" rows="4" placeholder="请分享您的旅游经验或建议..."></textarea>

            <button type="submit">提交问卷</button>
        </form>
        <div class="links">
            <p><a href="index.html">返回首页</a></p>
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('感谢您的参与！问卷已提交。');
            // 这里可以添加实际的提交逻辑
        });
    </script>
</body>
</html>
